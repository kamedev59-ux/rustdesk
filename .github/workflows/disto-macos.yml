# .github/workflows/disto-macos.yml
# Build macOS NON SIGNE de disto (RustDesk fork), 2 architectures.
# Derive de rustdesk/rustdesk master (build-for-macOS) + branding disto.
# 1er build : bundle interne reste "RustDesk.app" (evite de casser build.py),
# mais l'app affiche "disto" (APP_NAME) + icone disto. Signature ad-hoc incluse.

name: Build disto (macOS, unsigned)

on:
  workflow_dispatch:

env:
  MAC_RUST_VERSION: "1.81"
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VERSION: "1.4.8"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"

jobs:
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Install prerequisites
        run: |
          sudo apt-get install ca-certificates -y
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake curl gcc git g++ libclang-dev libgtk-3-dev \
            llvm-dev nasm ninja-build pkg-config wget
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: bridge-ubuntu-22.04
      - name: Cache Bridge
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: /tmp/flutter_rust_bridge
          key: bridge-3.22.3
      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: "3.22.3"
          cache: true
      - name: Install flutter rust bridge deps
        shell: bash
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' flutter/pubspec.yaml
          pushd flutter && flutter pub get && popd
      - name: Run flutter rust bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h

  build-for-macOS:
    name: ${{ matrix.job.target }}
    needs: [generate-bridge]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-apple-darwin, os: macos-14,       arch: aarch64, vcpkg-triplet: arm64-osx, extra-build-args: "--screencapturekit" }
          - { target: x86_64-apple-darwin,  os: macos-15-intel, arch: x86_64,  vcpkg-triplet: x64-osx,   extra-build-args: "" }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Brand disto (serveur grave, nom, couleurs, ameliorations)
        shell: bash
        env:
          DISTO_SERVER: ${{ secrets.DISTO_SERVER }}
          DISTO_KEY: ${{ secrets.DISTO_KEY }}
          DISTO_BLOCK_B64: ""
        run: |
          set -e
          CONF=libs/hbb_common/src/config.rs
          # Serveur + cle + nom (perl = portable sur le sed BSD de macOS)
          perl -i -pe 'BEGIN{$s=$ENV{DISTO_SERVER}} s/rs-ny\.rustdesk\.com/$s/g' "$CONF"
          perl -i -pe 'BEGIN{$k=$ENV{DISTO_KEY}} s/\QOeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=\E/$k/g' "$CONF"
          perl -i -pe 's/RwLock::new\("RustDesk"\.to_owned\(\)\)/RwLock::new("disto".to_owned())/' "$CONF"
          # Qualite par defaut best
          perl -i -pe 's/"balanced"/"best"/ if /OPTION_IMAGE_QUALITY/' "$CONF"
          grep -nE 'RENDEZVOUS_SERVERS|RS_PUB_KEY|APP_NAME|OPTION_IMAGE_QUALITY' "$CONF" || echo "ATTENTION config.rs"
          # Couleurs du theme
          DART=flutter/lib/common.dart
          perl -i -pe 's/Color\(0xFF0071FF\)/Color(0xFF7257F0)/ if /static const Color accent /' "$DART"
          perl -i -pe 's/Color\(0xFF2C8CFF\)/Color(0xFF7257F0)/ if /static const Color button /' "$DART"
          perl -i -pe 's/Color\(0xFF00B6F0\)/Color(0xFF22D3EE)/ if /static const Color idColor /' "$DART"
          # Textes -> disto + copyright About
          perl -i -pe 's/RustDesk/disto/g' src/lang/en.rs
          perl -i -pe 's/Purslane Ltd/disto/g' flutter/lib/desktop/pages/desktop_setting_page.dart
          # Auto-blocage souris (model.dart) - insertion apres l'ancre
          printf '%s' "$DISTO_BLOCK_B64" | base64 -d > disto_block.dart
          MODEL=flutter/lib/models/model.dart
          perl -i -0pe 'BEGIN{local $/; open F,"disto_block.dart" or die; $s=<F>; close F} s/(arg: kOptionToggleShowMyCursor\)\);\n)/$1$s/' "$MODEL"
          grep -n 'disto: auto-bloque' "$MODEL" || echo "ATTENTION auto-block non insere"

      - name: Logo interne + icone macOS (disto)
        shell: bash
        env:
          LOGO_PNG: ""
        run: |
          set -e
          mkdir -p flutter/assets
          printf '%s' "$LOGO_PNG" | base64 -d > flutter/assets/logo.png
          SRC=flutter/assets/logo.png
          mkdir -p disto.iconset
          sips -z 16 16     "$SRC" --out disto.iconset/icon_16x16.png
          sips -z 32 32     "$SRC" --out disto.iconset/icon_16x16@2x.png
          sips -z 32 32     "$SRC" --out disto.iconset/icon_32x32.png
          sips -z 64 64     "$SRC" --out disto.iconset/icon_32x32@2x.png
          sips -z 128 128   "$SRC" --out disto.iconset/icon_128x128.png
          sips -z 256 256   "$SRC" --out disto.iconset/icon_128x128@2x.png
          sips -z 256 256   "$SRC" --out disto.iconset/icon_256x256.png
          sips -z 512 512   "$SRC" --out disto.iconset/icon_256x256@2x.png
          sips -z 512 512   "$SRC" --out disto.iconset/icon_512x512.png
          sips -z 1024 1024 "$SRC" --out disto.iconset/icon_512x512@2x.png
          iconutil -c icns disto.iconset -o flutter/macos/Runner/AppIcon.icns
          ls -l flutter/macos/Runner/AppIcon.icns flutter/assets/logo.png

      - name: Install build runtime
        run: |
          brew install llvm create-dmg
          if command -v pkg-config &>/dev/null; then echo "pkg-config present"; else brew install pkg-config; fi

      - name: Install NASM 2.16.x (PAS le brew 3.x)
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch flutter
        run: |
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{ env.FLUTTER_VERSION }} ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Workaround for flutter issue
        shell: bash
        run: |
          cd "$(dirname "$(which flutter)")"
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart
          grep -n '_setFramesEnabledState(false);' ../packages/flutter/lib/src/scheduler/binding.dart || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ${{ matrix.job.os }}

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          if ! $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; echo "======"; cat "$_1"; echo "======"; echo ""
            done
            exit 1
          fi

      - name: Build rustdesk
        run: |
          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          fi
          ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.job.extra-build-args }}

      - name: Signature ad-hoc + creation du dmg
        run: |
          APP="./flutter/build/macos/Build/Products/Release/RustDesk.app"
          # Signature ad-hoc (necessaire pour lancer sur Apple Silicon)
          codesign --force --deep -s - "$APP" || echo "codesign ad-hoc: avertissement (peut-etre deja signe)"
          codesign -dv "$APP" 2>&1 | grep -i signature || true
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG" || true
          create-dmg --volname "disto" --icon "RustDesk.app" 200 190 --hide-extension "RustDesk.app" --window-size 800 400 --app-drop-link 600 185 disto-${{ env.VERSION }}-${{ matrix.job.arch }}.dmg "$APP"
          ls -l disto-${{ env.VERSION }}-${{ matrix.job.arch }}.dmg

      - name: Upload unsigned macOS dmg
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disto-unsigned-macos-${{ matrix.job.arch }}
          path: disto-${{ env.VERSION }}-${{ matrix.job.arch }}.dmg
