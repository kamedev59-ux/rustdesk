# .github/workflows/disto-windows.yml
#
# Workflow FORK autonome : compile UNIQUEMENT le binaire Windows x86_64 (Flutter
# desktop) de RustDesk, NON SIGNÉ. Dérivé de rustdesk/rustdesk master :
#   - .github/workflows/flutter-build.yml  (job: build-for-windows-flutter)
#   - .github/workflows/bridge.yml         (job: generate_bridge)
#   - .github/workflows/third-party-RustDeskTempTopMostWindow.yml
#   - build.py                             (build_flutter_windows)
# Toutes les étapes de signature / publication / autres plateformes / arm64 retirées.
#
# PHASE 1 (build vanille). La gravure du serveur disto (Phase 2) ajoutera une étape
# de patch `sed` sur libs/hbb_common/src/config.rs AVANT l'étape "Build rustdesk".

name: Build disto (Windows x64, unsigned)

on:
  workflow_dispatch:

env:
  # --- copié verbatim de flutter-build.yml env: ---
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.8"
  # --- copié verbatim de bridge.yml env: ---
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"

jobs:
  # =========================================================================
  # JOB 1: flutter_rust_bridge codegen (PRÉREQUIS OBLIGATOIRE).
  # Calque de bridge.yml generate_bridge, variante x64/Flutter-3.22.3.
  # Le build Windows télécharge ce 'bridge-artifact' avant de compiler.
  # =========================================================================
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt-get install ca-certificates -y
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake curl gcc git g++ libclang-dev libgtk-3-dev \
            llvm-dev nasm ninja-build pkg-config wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: bridge-ubuntu-22.04

      - name: Cache Bridge
        id: cache-bridge
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: /tmp/flutter_rust_bridge
          key: bridge-3.22.3

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: "3.22.3"
          cache: true

      - name: Install flutter rust bridge deps
        shell: bash
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          # Flutter 3.22.3 par défaut : extended_text 14 exige un Dart plus récent, on rétrograde pour la résolution.
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' flutter/pubspec.yaml
          pushd flutter && flutter pub get && popd

      - name: Run flutter rust bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h

  # =========================================================================
  # JOB 2: RustDeskTempTopMostWindow (WindowInjection.dll), x64.
  # Calque de third-party-RustDeskTempTopMostWindow.yml. La DLL est intégrée
  # au dossier Release. OPTIONNEL pour un binaire qui se lance, mais requis
  # pour la fonction "fenêtre toujours au-dessus pendant une session" → inclus.
  # =========================================================================
  build-topmostwindow:
    runs-on: windows-2022
    env:
      project_path: WindowInjection/WindowInjection.vcxproj
      build_output_dir: RustDeskTempTopMostWindow/WindowInjection/x64/Release
    steps:
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Download the source code
        run: git clone https://github.com/rustdesk-org/RustDeskTempTopMostWindow RustDeskTempTopMostWindow

      - name: Build the project
        run: |
          cd RustDeskTempTopMostWindow && git checkout ecd8d6a139eee76845ea66423fb739af450fda90
          msbuild ${{ env.project_path }} -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10

      - name: Archive build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: topmostwindow-artifacts-x64
          path: |
            ./${{ env.build_output_dir }}/WindowInjection.dll

  # =========================================================================
  # JOB 3: build Windows x86_64 (Flutter desktop).
  # Calque de build-for-windows-flutter (entrée de matrice x86_64-pc-windows-msvc).
  # =========================================================================
  build-for-windows-flutter:
    needs: [generate-bridge, build-topmostwindow]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0 # v2.0.9
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        id: flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225 # v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{ env.FLUTTER_VERSION }} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; echo "======"; cat "$_1"; echo "======"; echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true

      - name: Graver le serveur disto + renommer en disto (patch)
        shell: bash
        env:
          DISTO_SERVER: ${{ secrets.DISTO_SERVER }}
          DISTO_KEY: ${{ secrets.DISTO_KEY }}
        run: |
          set -e
          CONF=libs/hbb_common/src/config.rs
          test -f "$CONF" || { echo "config.rs introuvable (sous-module non initialise ?)"; exit 1; }
          # --- Phase 2 : serveur + cle disto (valeurs venant des Secrets) ---
          sed -i "s#rs-ny\.rustdesk\.com#${DISTO_SERVER}#g" "$CONF"
          sed -i "s#OeVuKk5nlHiXp+APNn0Y3pC1Iwpwn44JGqrQCsWqmBw=#${DISTO_KEY}#g" "$CONF"
          # --- Phase 3 : nom de l'app ---
          sed -i 's#RwLock::new("RustDesk".to_owned())#RwLock::new("disto".to_owned())#' "$CONF"
          echo "=== Verif config.rs (serveur / cle / nom) ==="
          grep -nE 'RENDEZVOUS_SERVERS|RS_PUB_KEY|APP_NAME' "$CONF" || echo "ATTENTION: motifs config.rs introuvables"
          # --- Phase 3 : metadonnees Windows (secondaire, non bloquant) ---
          sed -i 's/ProductName = "RustDesk"/ProductName = "disto"/' Cargo.toml || true
          sed -i 's/FileDescription = "RustDesk Remote Desktop"/FileDescription = "disto - depannage a distance"/' Cargo.toml || true
          if [ -f flutter/windows/runner/Runner.rc ]; then
            sed -i 's/"RustDesk"/"disto"/g' flutter/windows/runner/Runner.rc || true
          fi
          echo "=== Verif metadonnees Cargo.toml ==="
          grep -nE 'ProductName|FileDescription' Cargo.toml || echo "(winres non trouve)"
          # --- Phase 4 : couleurs du theme (violet #7257F0 / cyan #22D3EE) ---
          DART=flutter/lib/common.dart
          if [ -f "$DART" ]; then
            sed -i 's/static const Color accent = Color(0xFF0071FF);/static const Color accent = Color(0xFF7257F0);/' "$DART"
            sed -i 's/static const Color button = Color(0xFF2C8CFF);/static const Color button = Color(0xFF7257F0);/' "$DART"
            sed -i 's/static const Color idColor = Color(0xFF00B6F0);/static const Color idColor = Color(0xFF22D3EE);/' "$DART"
            echo "=== Verif couleurs common.dart ==="
            grep -nE 'static const Color (accent|button|idColor) =' "$DART" || echo "(couleurs non trouvees)"
          fi

      - name: Injecter les icones disto
        shell: bash
        env:
          ICO_APP: ""
          ICO_MAIN: ""
          ICO_TRAY: ""
          PNG_ICON: ""
          PNG_32: ""
          PNG_64: ""
          PNG_128: ""
          PNG_256: ""
        run: |
          set -e
          mkdir -p flutter/windows/runner/resources res
          printf '%s' "$ICO_APP" | base64 -d > flutter/windows/runner/resources/app_icon.ico
          printf '%s' "$ICO_MAIN" | base64 -d > res/icon.ico
          printf '%s' "$ICO_TRAY" | base64 -d > res/tray-icon.ico
          printf '%s' "$PNG_ICON" | base64 -d > res/icon.png
          printf '%s' "$PNG_32" | base64 -d > res/32x32.png
          printf '%s' "$PNG_64" | base64 -d > res/64x64.png
          printf '%s' "$PNG_128" | base64 -d > res/128x128.png
          printf '%s' "$PNG_256" | base64 -d > res/128x128@2x.png
          echo "=== Icones disto injectees ==="
          ls -l flutter/windows/runner/resources/app_icon.ico res/icon.ico res/tray-icon.ico res/icon.png res/32x32.png res/64x64.png res/128x128.png res/128x128@2x.png

      - name: Build rustdesk
        run: |
          # --portable --flutter --skip-portable-pack --hwcodec --vram  (build-args de la matrice x64)
          python3 .\build.py --portable --flutter --skip-portable-pack --hwcodec --vram
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

          # Helper d'affichage virtuel (usbmmidd_v2)
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./rustdesk

          # Pilote d'impression (vérifié par checksum ; échecs non bloquants)
          try {
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums
            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1.4\.zip$').Matches.Groups[1].Value
            $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256
            $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
            $downloadsum_adapter = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256
            if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_adapter -eq $downloadsum_adapter.Hash) {
                Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
                mkdir ./rustdesk/drivers
                mv -Force .\rustdesk_printer_driver_v4-1.4 ./rustdesk/drivers/RustDeskPrinterDriver
                Expand-Archive printer_driver_adapter.zip -DestinationPath .
                mv -Force .\printer_driver_adapter.dll ./rustdesk
            } else {
                Write-Output "printer driver checksums do not match, ignoring."
            }
          } catch {
              Write-Host "Ignore the printer driver error."
          }

      - name: Renommer l'executable en disto.exe
        shell: bash
        run: |
          set -e
          if [ -f ./rustdesk/rustdesk.exe ]; then
            mv ./rustdesk/rustdesk.exe ./rustdesk/disto.exe
            echo "Renomme : rustdesk.exe -> disto.exe"
          else
            echo "ATTENTION: ./rustdesk/rustdesk.exe introuvable"
          fi
          ls -l ./rustdesk/*.exe

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: topmostwindow-artifacts-x64
          path: "./rustdesk"

      - name: Upload unsigned
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disto-windows-x86_64
          path: rustdesk
